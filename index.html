<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
  <title>Luc Barendse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="hero">
    <!-- Replace this with your own background image by setting CSS background-image in style.css -->
    <div class="hero-overlay"></div>

    <span class="site-title"><b>Luc Barendse</b></span>

    <nav class="nav">

      <!-- Projecten dropdown (left) -->
      <div class="dropdown">
        <button class="dropbtn">Projecten ▾</button>
        <div class="dropdown-content">
          <div class="dropdown-nested">
            <a href="#">Foto ▾</a>
            <div class="dropdown-nested-content">
              <a href="link1">Project 1</a>
              <a href="link2">Project 2</a>
            </div>
          </div>
          <div class="dropdown-nested">
            <a href="#">Video ▾</a>
            <div class="dropdown-nested-content">
              <a href="link3">Project 1</a>
              <a href="link4">Project 2</a>
            </div>
          </div>
        </div>
      </div>

      <!-- About (center) -->
      <button class="navbtn center">About</button>

      <!-- Contact (right) -->
      <button class="navbtn right">Contact</button>

    </nav>
  </div>

  <script>
    // Toggle main dropdown
    const dropbtn = document.querySelector('.dropbtn');
    const dropdownContent = document.querySelector('.dropdown-content');

    dropbtn.addEventListener('click', function (e) {
      e.stopPropagation();
      dropdownContent.classList.toggle('open');
    });

    // Toggle nested dropdowns
    document.querySelectorAll('.dropdown-nested > a').forEach(function (link) {
      link.addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();
        const nested = this.nextElementSibling;
        // Close other nested menus
        document.querySelectorAll('.dropdown-nested-content').forEach(function (el) {
          if (el !== nested) el.classList.remove('open');
        });
        nested.classList.toggle('open');
      });
    });

    // Close everything when clicking outside
    document.addEventListener('click', function () {
      dropdownContent.classList.remove('open');
      document.querySelectorAll('.dropdown-nested-content').forEach(function (el) {
        el.classList.remove('open');
      });
    });
  </script>

</body>
</html>
